name: 'Gitea Pull Request'
description: 'Create a new PR for Gitea using the Gitea REST API (Python + JSON), no tea CLI required.'
author: 'thefoundation'

inputs:
  url:
    description: 'URL to the Gitea instance (e.g. https://try.gitea.io)'
    required: true
  token:
    description: 'Gitea Personal Access Token (PAT). Store as a GitHub secret.'
    required: true
  path:
    description: 'Relative path under $GITHUB_WORKSPACE to the repository'
    required: false
    default: ${{ github.workspace }}
  remote:
    description: 'Name of the git remote that points at the Gitea repository'
    required: false
    default: 'origin'
  commit-message:
    description: 'Commit message to use if there are local changes to commit'
    required: false
    default: '[create-pull-request] automated change'
  committer:
    description: 'Committer name and email, in the form "Display Name <email@address.com>"'
    required: false
    default: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
  author:
    description: 'Author name and email, in the form "Display Name <email@address.com>"'
    required: false
    default: '${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>'
  signoff:
    description: 'Add a Signed-off-by line to the commit'
    required: false
    default: 'false'
  base:
    description: 'The pull request base branch. Defaults to the Gitea repo default branch if omitted.'
    required: false
    default: ''
  branch:
    description: 'The pull request head/source branch'
    required: false
    default: 'create-pull-request/patch'
  title:
    description: 'The title of the pull request'
    required: false
    default: 'Changes by create-pull-request action'
  body-path:
    description: 'Path to a file containing the pull request body. Takes precedence over body.'
    required: false
    default: ''
  body:
    description: 'The body of the pull request. Ignored if body-path is set.'
    required: false
    default: 'Automated changes by actions'
  pr-label:
    description: 'Comma-separated list of labels to add to the pull request'
    required: false
    default: ''
  assignee:
    description: 'Comma-separated list of Gitea usernames to assign to the pull request'
    required: false
    default: ''

outputs:
  pr-url:
    description: 'URL of the created (or already-existing) pull request'
    value: ${{ steps.create-pr.outputs.pr-url }}
  pr-number:
    description: 'Number of the created (or already-existing) pull request'
    value: ${{ steps.create-pr.outputs.pr-number }}

runs:
  using: 'composite'
  steps:
    - name: Commit and push changes
      shell: bash
      working-directory: ${{ inputs.path }}
      run: |
        set -euo pipefail

        committer_name="${COMMITTER%% <*}"
        committer_email="${COMMITTER#*<}"
        committer_email="${committer_email%>}"
        git config user.name "$committer_name"
        git config user.email "$committer_email"

        if [ -n "$(git status --porcelain)" ]; then
          git add -A
          SIGNOFF_FLAG=""
          if [ "${SIGNOFF}" = "true" ]; then
            SIGNOFF_FLAG="--signoff"
          fi
          git commit --author "${AUTHOR}" -m "${COMMIT_MESSAGE}" $SIGNOFF_FLAG
        else
          echo "No local changes to commit."
        fi

        git checkout -B "${BRANCH}"
        git push "${REMOTE}" "${BRANCH}" --force
      env:
        COMMITTER: ${{ inputs.committer }}
        AUTHOR: ${{ inputs.author }}
        SIGNOFF: ${{ inputs.signoff }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
        BRANCH: ${{ inputs.branch }}
        REMOTE: ${{ inputs.remote }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Create Gitea pull request
      id: create-pr
      shell: bash
      working-directory: ${{ inputs.path }}
      env:
        GITEA_URL: ${{ inputs.url }}
        GITEA_TOKEN: ${{ inputs.token }}
        GITEA_REMOTE: ${{ inputs.remote }}
        PR_BASE: ${{ inputs.base }}
        PR_BRANCH: ${{ inputs.branch }}
        PR_TITLE: ${{ inputs.title }}
        PR_BODY: ${{ inputs.body }}
        PR_BODY_PATH: ${{ inputs.body-path }}
        PR_LABELS: ${{ inputs.pr-label }}
        PR_ASSIGNEES: ${{ inputs.assignee }}
      run: python3 "${{ github.action_path }}/create_pr.py"

